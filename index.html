<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; connect-src 'self' http://localhost:8080; style-src 'self' 'unsafe-inline'">
    <link href="./styles.css" rel="stylesheet">
    <title>Hosthelper</title>
  </head>
  <body>

    <!--Section for the login page parts-->
    <section id="login-page" class="view">
      <h1>Log in to Hosthelper</h1>
      <input type="text" placeholder="Username">
      <input type="password" placeholder="Password">
      <button>
        Log in
      </button>
      <p>Don't have profile?
        <a href="#" id="register-link">Register here</a>
      </p>
    </section>

    <!--Section for the register page parts-->
    <section id="register-page" class="view" style="display: none;">
      <h1>Register</h1>
      <input type="text" id="register-username" placeholder="Username">
      <input type="password" id="register-password" placeholder="Password">
      <button id="register-user">
        Create profile/user
      </button>
      <p><a href="#" id="login-link">Back to login page</a></p>
    </section>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>
